<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: 'VT323', monospace; /* Retro terminal font */
            overflow: hidden; /* Hide scrollbars */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Canvas for the Matrix Rain */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Behind the content */
        }

        /* The Profile Card Container */
        .card {
            position: relative;
            z-index: 10; /* Above the canvas */
            background: rgba(0, 0, 0, 0.85); /* Semi-transparent black */
            border: 2px solid #0F0; /* Green border */
            box-shadow: 0 0 20px #0F0, inset 0 0 10px #0F0; /* Neon glow */
            padding: 2rem 4rem;
            text-align: center;
            border-radius: 10px;
            backdrop-filter: blur(3px); /* Blur the code behind the card */
            animation: flicker 4s infinite; /* Subtle text flicker */
        }

        h1 {
            color: #0F0;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #0F0;
        }

        p {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        /* Social Links Container */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* Individual Buttons */
        .btn {
            text-decoration: none;
            color: #000;
            background-color: #0F0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #0F0;
        }

        /* Hover Effect for Buttons */
        .btn:hover {
            background-color: #fff;
            color: #0F0;
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 0 25px #0F0;
        }

        /* Animation: CRT Flicker effect */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                opacity: 1;
            }
            20%, 24%, 55% {
                opacity: 0.9;
            }
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .card { padding: 2rem; width: 90%; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="card">
        <h1>YOUR NAME</h1>
        <p>System Online. Welcome.</p>
        
        <div class="social-links">
            <a href="https://instagram.com/yourusername" target="_blank" class="btn">
                <i class="fab fa-instagram"></i>
            </a>
            
            <a href="https://twitter.com/yourusername" target="_blank" class="btn">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            
            <a href="https://tiktok.com/@yourusername" target="_blank" class="btn">
                <i class="fab fa-tiktok"></i>
            </a>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT MATRIX EFFECT --- */
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas to full screen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Characters to use in the rain (Katakana + Latin + Numerals)
        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        // Array of drops - one per column
        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1; 
        }

        // Draw function
        const draw = () => {
            // Black background with slight opacity to create the trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Green text
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Reset drop to top randomly after it has crossed the screen
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        };

        // Loop the animation
        setInterval(draw, 30);

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
