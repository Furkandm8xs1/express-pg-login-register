<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap</title>
  <style>
    * {
      margin: 0px;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0b7a23 0%, #1a13d6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 70px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 50px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e1e1e1;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }

    .link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .link a:hover {
      text-decoration: underline;
    }

    /* Mobil ve Tablet Responsive Tasarım */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .container {
        padding: 30px;
        border-radius: 15px;
      }

      h2 {
        font-size: 1.5rem;
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        font-size: 0.95rem;
        margin-bottom: 8px;
      }

      input {
        padding: 12px;
        font-size: 16px;
        border-radius: 8px;
      }

      button {
        padding: 12px;
        font-size: 1rem;
        border-radius: 8px;
      }

      .message {
        font-size: 0.9rem;
        padding: 12px;
        margin-top: 15px;
      }

      .link {
        font-size: 0.9rem;
        margin-top: 15px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      h2 {
        font-size: 1.3rem;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        font-size: 0.9rem;
        margin-bottom: 6px;
      }

      input {
        padding: 10px;
        font-size: 16px;
        border-radius: 6px;
      }

      button {
        padding: 11px;
        font-size: 0.95rem;
        border-radius: 6px;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .message {
        font-size: 0.85rem;
        padding: 10px;
        margin-top: 12px;
      }

      .link {
        font-size: 0.85rem;
        margin-top: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>🔐 Giriş Yap</h2>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ornek@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" placeholder="Şifrenizi girin" required>
      </div>

      <button type="submit" id="submitBtn">Giriş Yap</button>
    </form>

    <div id="message" class="message"></div>

    <div class="link">
      Hesabın yok mu? <a href="/register">Kayıt Ol</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Giriş yapılıyor...';

      const data = {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
          showMessage('Giriş başarılı! Yönlendiriliyorsunuz...', 'success');

          // login.html içindeki script kısmı

          if (result.token) {
            const maxAge = 3600;
            // SameSite=Lax, kullanıcı login sonrası sayfaya yönlendirildiğinde cookie'nin gitmesini garantiye alır.
            document.cookie = `token=${result.token}; path=/; max-age=${maxAge}; SameSite=Lax`;
            console.log('✅ Token cookie\'ye kaydedildi');
          }

          // Profile sayfasına yönlendir (küçük bir delay ile)
          setTimeout(() => {
            window.location.href = '/profile';
          }, 500);

        } else {
          showMessage(result.error || 'Giriş başarısız', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Giriş Yap';
        }
      } catch (error) {
        console.error('Login error:', error);
        showMessage('Sunucuya bağlanılamadı', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Giriş Yap';
      }
    });

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
    }
  </script>
</body>

</html>
